<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Ask mode loop</title>
  <desc id="desc">Ask mode reads context, answers clearly, then waits for the user to review or ask a follow-up question.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#374151" />
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#8b5cf6" />
    </marker>
    <style>
      .panel { fill: #eef3ff; stroke: #d7e5ff; stroke-width: 2.2; }
      .ink { fill: #154c79; font: 700 24px "Bradley Hand", "Marker Felt", "Comic Sans MS", cursive; }
      .box { stroke-width: 3; }
      .boxtext { fill: #1f2937; font: 700 22px "Bradley Hand", "Marker Felt", "Comic Sans MS", cursive; text-anchor: middle; }
      .arrow { fill: none; stroke: #374151; stroke-width: 3.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #8b5cf6; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 10 8; marker-end: url(#arrow-purple); }
      .note { fill: #8b5cf6; font: 700 18px "Bradley Hand", "Marker Felt", "Comic Sans MS", cursive; }
    </style>
  </defs>

  <rect class="panel" x="18" y="18" width="864" height="524" rx="28" />
  <text class="ink" x="56" y="60">Ask mode: read first, answer clearly, then wait for the human</text>

  <rect class="box" x="58" y="228" width="152" height="86" rx="18" fill="#a5d8ff" stroke="#4a9eed" />
  <text class="boxtext" x="134" y="262">Prompt</text>
  <text class="boxtext" x="134" y="288">or question</text>

  <rect class="box" x="264" y="204" width="192" height="132" rx="20" fill="#fff3bf" stroke="#f59e0b" />
  <text class="boxtext" x="360" y="244">Search the</text>
  <text class="boxtext" x="360" y="270">workspace</text>
  <text class="boxtext" x="360" y="296">for context</text>

  <rect class="box" x="516" y="216" width="184" height="108" rx="20" fill="#b2f2bb" stroke="#22c55e" />
  <text class="boxtext" x="608" y="248">Answer,</text>
  <text class="boxtext" x="608" y="274">options, or</text>
  <text class="boxtext" x="608" y="300">suggested code</text>

  <rect class="box" x="752" y="228" width="110" height="86" rx="18" fill="#ffd8a8" stroke="#f59e0b" />
  <text class="boxtext" x="807" y="262">You review</text>
  <text class="boxtext" x="807" y="288">or apply</text>

  <path class="arrow" d="M210 271 L264 271" />
  <path class="arrow" d="M456 270 L516 270" />
  <path class="arrow" d="M700 271 L752 271" />

  <path class="loop" d="M807 314 L807 438 L126 438 L126 314" />
  <text class="note" x="390" y="448">Follow-up question</text>
</svg>
